name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
          arm-none-eabi-gcc --version

      - name: Fetch open62541 amalgamated release
        run: |
          mkdir -p third_party/open62541
          curl -fsSL -o third_party/open62541/open62541.c \
            https://github.com/open62541/open62541/releases/download/v1.3.9/open62541.c
          curl -fsSL -o third_party/open62541/open62541.h \
            https://github.com/open62541/open62541/releases/download/v1.3.9/open62541.h
          curl -fsSL -o third_party/open62541/LICENSE \
            https://raw.githubusercontent.com/open62541/open62541/v1.3.9/LICENSE
          ls -l third_party/open62541/

      - name: Compile (syntax check on host)
        run: |
          arm-none-eabi-gcc -c -mcpu=cortex-m4 -mfloat-abi=soft -mthumb \
            -DUA_CONFIG_H_FILE='"ua_config.h"' \
            -I Inc -I third_party/open62541 \
            -ffunction-sections -fdata-sections \
            Src/opcua_server_task.c -o /tmp/opcua_server_task.o
          arm-none-eabi-gcc -c -mcpu=cortex-m4 -mfloat-abi=soft -mthumb \
            -DUA_CONFIG_H_FILE='"ua_config.h"' \
            -I Inc -I third_party/open62541 \
            -ffunction-sections -fdata-sections \
            Src/opcua_node_model.c -o /tmp/opcua_node_model.o
          ls -l /tmp/*.o

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            /tmp/opcua_server_task.o
            /tmp/opcua_node_model.o
