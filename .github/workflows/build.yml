name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libmbedtls-dev
          gcc --version
          dpkg -l | grep mbedtls

      - name: Fetch open62541 amalgamated release
        # CI uses the real amalgamation so the build validates against
        # the same header and API the STM32CubeIDE build will see.
        # We compile it for the host (Linux/POSIX) with all the heavy
        # features (discovery, encryption, history) turned off via
        # the project's Inc/ua_config.h.
        run: |
          mkdir -p third_party/open62541
          UA_VER=v1.5.4
          curl -fsSL -o third_party/open62541/open62541.c \
            https://github.com/open62541/open62541/releases/download/${UA_VER}/open62541.c
          curl -fsSL -o third_party/open62541/open62541.h \
            https://github.com/open62541/open62541/releases/download/${UA_VER}/open62541.h
          ls -l third_party/open62541/
          head -50 third_party/open62541/open62541.h

      - name: Compile amalgamation (host)
        working-directory: third_party/open62541
        run: |
          set -e
          gcc -c -O0 -g \
            -DUA_CONFIG_H_FILE='"../../Inc/ua_config.h"' \
            -I . -I ../../Inc \
            -Wno-implicit-function-declaration \
            open62541.c -o /tmp/open62541.o
          ls -l /tmp/open62541.o

      - name: Compile application sources (host)
        run: |
          set -e
          CFLAGS="-c -O0 -g \
                  -DUA_CONFIG_H_FILE='\"ua_config.h\"' \
                  -I Inc -I third_party/open62541 \
                  -Wno-implicit-function-declaration"
          gcc $CFLAGS Src/opcua_server_task.c -o /tmp/opcua_server_task.o
          gcc $CFLAGS Src/opcua_node_model.c   -o /tmp/opcua_node_model.o
          gcc $CFLAGS Src/main_ci.c            -o /tmp/main_ci.o
          gcc -c -O0 -g -I Inc -DUA_CONFIG_H_FILE='"ua_config.h"' -I third_party/open62541 \
            Src/cmsis_os_stubs.c -o /tmp/cmsis_os_stubs.o
          ls -l /tmp/*.o

      - name: Link executable (host)
        run: |
          set -e
          gcc -o /tmp/opcua_server \
            /tmp/open62541.o \
            /tmp/opcua_server_task.o \
            /tmp/opcua_node_model.o \
            /tmp/cmsis_os_stubs.o \
            /tmp/main_ci.o \
            -lpthread -lm \
            -lmbedtls -lmbedcrypto -lmbedx509
          size /tmp/opcua_server || true
          file /tmp/opcua_server
          ls -l /tmp/opcua_server

      - name: Smoke test (run for 3 seconds, check :4840 binds)
        run: |
          set -e
          # Start the server in the background, give it time to bind the
          # OPC UA listener, and probe the port.
          /tmp/opcua_server &
          SERVER_PID=$!
          sleep 2
          if ss -tlnp 2>/dev/null | grep -q ':4840'; then
            echo "OPC UA server bound to :4840 - OK"
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
            exit 0
          else
            echo "OPC UA server did NOT bind :4840"
            kill $SERVER_PID 2>/dev/null || true
            wait $SERVER_PID 2>/dev/null || true
            ss -tlnp 2>/dev/null || true
            exit 1
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opcua-server-elf
          path: /tmp/opcua_server
