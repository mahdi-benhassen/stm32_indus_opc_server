name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libmbedtls-dev
          gcc --version
          dpkg -l | grep mbedtls

      - name: Fetch open62541 amalgamated release
        # CI uses the real amalgamation so the build validates against
        # the same header and API the STM32CubeIDE build will see.
        # We compile it for the host (Linux/POSIX) with all the heavy
        # features (discovery, encryption, history) turned off via
        # the project's Inc/ua_config.h.
        run: |
          mkdir -p third_party/open62541
          UA_VER=v1.5.4
          curl -fsSL -o third_party/open62541/open62541.c \
            https://github.com/open62541/open62541/releases/download/${UA_VER}/open62541.c
          curl -fsSL -o third_party/open62541/open62541.h \
            https://github.com/open62541/open62541/releases/download/${UA_VER}/open62541.h
          ls -l third_party/open62541/
          head -50 third_party/open62541/open62541.h

      - name: Compile amalgamation (host)
        working-directory: third_party/open62541
        run: |
          set -e
          gcc -c -O0 -g \
            -DUA_CONFIG_H_FILE='"../../Inc/ua_config.h"' \
            -I . -I ../../Inc \
            -Wno-implicit-function-declaration \
            open62541.c -o /tmp/open62541.o
          ls -l /tmp/open62541.o

      - name: Compile application sources (host)
        run: |
          set -e
          CFLAGS="-c -O0 -g \
                  -DUA_CONFIG_H_FILE='\"ua_config.h\"' \
                  -I Inc -I third_party/open62541 \
                  -Wno-implicit-function-declaration"
          gcc $CFLAGS Src/opcua_server_task.c -o /tmp/opcua_server_task.o
          gcc $CFLAGS Src/opcua_node_model.c   -o /tmp/opcua_node_model.o
          gcc $CFLAGS Src/main_ci.c            -o /tmp/main_ci.o
          gcc -c -O0 -g -I Inc -DUA_CONFIG_H_FILE='"ua_config.h"' -I third_party/open62541 \
            Src/cmsis_os_stubs.c -o /tmp/cmsis_os_stubs.o
          ls -l /tmp/*.o

      - name: "Diagnostic: inspect the port arg in the compiled .o"
        run: |
          set -e
          echo "=== OpcUaServer_Init disassembly (first 30 mov/call/jmp) ==="
          objdump -d /tmp/opcua_server_task.o \
            | awk '/<OpcUaServer_Init>:/{flag=1} flag; /^$/{flag=0}' \
            | grep -E 'mov|call|jmp' | head -30
          echo "---"
          echo "=== Preprocessed setMinimal call ==="
          gcc -E -DUA_CONFIG_H_FILE='"ua_config.h"' -I Inc -I third_party/open62541 \
            Src/opcua_server_task.c \
            | grep -E 'setMinimal' | head -3

      - name: Link executable (host)
        run: |
          set -e
          gcc -o /tmp/opcua_server \
            /tmp/open62541.o \
            /tmp/opcua_server_task.o \
            /tmp/opcua_node_model.o \
            /tmp/cmsis_os_stubs.o \
            /tmp/main_ci.o \
            -lpthread -lm \
            -lmbedtls -lmbedcrypto -lmbedx509
          size /tmp/opcua_server || true
          file /tmp/opcua_server
          ls -l /tmp/opcua_server

      - name: Smoke test (run for 3 seconds, verify :4840 binds)
        run: |
          set -e
          /tmp/opcua_server > /tmp/opcua_server.log 2>&1 &
          SERVER_PID=$!

          # Send a minimal OPC UA Hello (HEL) message and look for the
          # Acknowledge (ACK) response.  This is a real end-to-end test
          # of the server.  The HEL/ACK encoding follows OPC UA Part 6.
          python3 - <<'PY'
import socket, struct, sys, time
hello = (
    b"HEL\x46"                       # message type + chunk type
    + struct.pack("<I", 8 + 4 + 4 + 4 + 4 + 4)  # message size
    + struct.pack("<I", 0)            # secure channel id
    + struct.pack("<I", 0x12D8)       # 4840 in network byte order
    + struct.pack("<I", 0)            # receive buffer size
    + struct.pack("<I", 0)            # send buffer size
    + struct.pack("<I", 0)            # max message size
    + struct.pack("<I", 0)            # max chunk count
)

# OPC UA Hello body
endpoint = b"opc.tcp://127.0.0.1:4840"
hello_body = struct.pack("<I", len(endpoint)) + endpoint
hello = b"HEL\x46" + struct.pack("<I", 8 + 4 + 4 + 4 + 4 + 4 + 4 + len(hello_body)) \
       + struct.pack("<I", 0) \
       + struct.pack("<I", 0x12D8) \
       + struct.pack("<I", 0) \
       + struct.pack("<I", 0) \
       + struct.pack("<I", 0) \
       + struct.pack("<I", 0) \
       + hello_body

for i in range(25):
    time.sleep(0.2)
    try:
        s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
        s.settimeout(1.0)
        s.connect(("127.0.0.1", 4840))
        s.sendall(hello)
        data = s.recv(1024)
        s.close()
        if data[:3] == b"ACK":
            print(f"OPC UA server on :4840 returned ACK after {(i+1)*200}ms - OK")
            sys.exit(0)
        else:
            print(f"got {data[:8].hex()!r} after {(i+1)*200}ms")
    except (ConnectionRefusedError, socket.timeout, OSError) as e:
        pass
print("OPC UA server did not respond on :4840 within 5s")
sys.exit(1)
PY
          TEST_RC=$?
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          cat /tmp/opcua_server.log
          exit $TEST_RC

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opcua-server-elf
          path: /tmp/opcua_server
