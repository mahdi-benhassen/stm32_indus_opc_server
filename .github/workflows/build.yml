name: CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi
          arm-none-eabi-gcc --version

      - name: Fetch open62541 amalgamated release (target reference only)
        # The amalgamation is consumed by the STM32CubeIDE build, NOT by CI.
        # We still keep a copy of the header under third_party/ for reference,
        # but the CI compile uses Inc/open62541_stub.h so the build doesn't
        # need to drag in the 16 MB .c, the lwIP stack, or pthread headers.
        run: |
          mkdir -p third_party/open62541
          UA_VER=v1.5.4
          curl -fsSL -o third_party/open62541/open62541.c \
            https://github.com/open62541/open62541/releases/download/${UA_VER}/open62541.c || true
          curl -fsSL -o third_party/open62541/open62541.h \
            https://github.com/open62541/open62541/releases/download/${UA_VER}/open62541.h || true
          ls -l third_party/open62541/ || true

      - name: Compile (syntax + link check on host)
        # The CI builds the two application translation units against the
        # local Inc/open62541_stub.h (not the 16 MB amalgamation) so we
        # don't need lwIP, FreeRTOS, or pthread on the runner.  On the
        # real target OPCUA_EMBEDDED_TARGET=1 swaps the stub for the
        # real open62541.h and links the amalgamation.
        run: |
          set -e
          CFLAGS="-c -mcpu=cortex-m4 -mfloat-abi=soft -mthumb \
                  -DUA_CONFIG_H_FILE='\"ua_config.h\"' \
                  -I Inc \
                  -ffunction-sections -fdata-sections \
                  -Wno-implicit-function-declaration"
          arm-none-eabi-gcc $CFLAGS Src/opcua_server_task.c -o /tmp/opcua_server_task.o
          arm-none-eabi-gcc $CFLAGS Src/opcua_node_model.c   -o /tmp/opcua_node_model.o
          arm-none-eabi-gcc -c -mcpu=cortex-m4 -mfloat-abi=soft -mthumb \
                  -I Inc \
                  Src/cmsis_os_stubs.c -o /tmp/cmsis_os_stubs.o
          arm-none-eabi-gcc -mcpu=cortex-m4 -mfloat-abi=soft -mthumb \
                  -nostdlib -Wl,--unresolved-symbols=ignore-all \
                  /tmp/opcua_server_task.o /tmp/opcua_node_model.o /tmp/cmsis_os_stubs.o \
                  -o /tmp/opcua_server.elf
          arm-none-eabi-size /tmp/opcua_server.elf || true
          ls -l /tmp/*.o /tmp/*.elf

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            /tmp/opcua_server_task.o
            /tmp/opcua_node_model.o
            /tmp/cmsis_os_stubs.o
            /tmp/opcua_server.elf
